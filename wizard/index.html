<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>抖音搜索任务指南</title>
  <style>
    :root {
      --blue: #0b5cff;
      --blue-dark: #073a9b;
      --blue-soft: #eef5ff;
      --red: #e52222;
      --text: #172033;
      --muted: #667085;
      --line: #d9e5f7;
      --bg: #f5f8ff;
      --yellow: #fff7df;
      --green: #149447;
      --shadow: 0 14px 34px rgba(15, 54, 120, .12);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.55;
    }
    button { font: inherit; }
    img { display: block; max-width: 100%; }

    .app {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top {
      padding: 18px 16px;
      color: #fff;
      background: linear-gradient(135deg, #063db8, #0b66ff 64%, #1aa3ff);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .top h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.18;
      letter-spacing: 0;
    }
    .top p {
      margin: 0;
      color: rgba(255,255,255,.92);
      font-weight: 700;
    }

    .progress-card {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(15,54,120,.08);
    }
    .progress-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      color: var(--blue-dark);
      font-weight: 900;
    }
    .progress-track {
      height: 9px;
      border-radius: 999px;
      background: #e6eefc;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 16.66%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), #1aa3ff);
      transition: width .22s ease;
    }

    .stage {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .stage-head {
      padding: 16px 16px 0;
    }
    .stage-kicker {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--blue-dark);
      background: var(--blue-soft);
      font-size: 13px;
      font-weight: 900;
    }
    .stage h2 {
      margin: 10px 0 0;
      font-size: 25px;
      line-height: 1.22;
      color: #091a3f;
      letter-spacing: 0;
    }
    .stage-body {
      padding: 14px 16px 16px;
    }
    .action {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      color: #172033;
    }
    .action .red { color: var(--red); }

    .tip-list {
      display: none;
      margin-top: 12px;
      gap: 8px;
    }
    .tip-list.show {
      display: grid;
    }
    .tip-item {
      padding: 10px 12px;
      border: 1px solid #cfe0ff;
      border-radius: 13px;
      background: #f2f7ff;
      color: #0b2a66;
      font-weight: 900;
    }

    .reminder {
      margin-top: 12px;
      padding: 11px 12px;
      border-radius: 13px;
      border: 1px solid #f1d68b;
      background: var(--yellow);
      font-weight: 850;
      color: #493200;
    }
    .reminder.red {
      border-color: #ffd1d1;
      background: #fff3f3;
      color: #501313;
    }

    .visual {
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #f7f9fc;
    }
    .visual button {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-in;
    }
    .visual img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #f7f9fc;
    }
    .visual-caption {
      padding: 9px 11px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
    .visual-placeholder {
      min-height: 170px;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      color: var(--blue-dark);
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(180deg, #fff, #f2f7ff);
    }
    .recording-visual {
      padding: 16px;
      background: linear-gradient(180deg, #fff, #edf5ff);
    }
    .recording-flow {
      display: grid;
      gap: 10px;
    }
    .recording-step {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid #cfe0ff;
      border-radius: 15px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(15,54,120,.06);
    }
    .recording-step b {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: var(--blue);
      font-size: 18px;
    }
    .recording-step strong {
      display: block;
      color: #091a3f;
      font-size: 17px;
      line-height: 1.25;
    }
    .recording-step span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    details {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fbfdff;
      overflow: hidden;
    }
    summary {
      padding: 10px 12px;
      cursor: pointer;
      color: var(--blue-dark);
      font-weight: 900;
    }
    .details-body {
      padding: 0 12px 12px;
      color: #263247;
    }
    .details-body ul {
      margin: 0;
      padding-left: 20px;
    }
    .details-body li { margin: 5px 0; }

    .audio-slot {
      display: none;
      margin-top: 12px;
    }
    .audio-slot.has-audio { display: block; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 10px;
    }
    .btn {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      font-weight: 900;
      cursor: pointer;
    }
    .btn.secondary {
      color: var(--blue-dark);
      background: #fff;
      border: 1px solid var(--line);
    }
    .btn.primary {
      color: #fff;
      background: var(--blue);
      box-shadow: 0 10px 22px rgba(11,92,255,.22);
    }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      box-shadow: none;
    }
    .restart {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      text-decoration: underline;
      cursor: pointer;
      align-self: center;
      justify-self: center;
      min-height: 36px;
      grid-column: 1 / -1;
    }

    .complete-page {
      display: none;
      flex: 1;
      padding: 18px 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .complete-page.show {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .complete-hero {
      text-align: center;
    }
    .complete-hero h2 {
      margin: 0 0 8px;
      font-size: 31px;
      line-height: 1.16;
      color: #071b48;
      letter-spacing: 0;
    }
    .complete-hero p {
      margin: 0 auto;
      max-width: 520px;
      color: #344054;
      font-weight: 850;
    }
    .completion-badge {
      position: relative;
      margin-top: 2px;
      padding: 20px 16px;
      border: 1px solid #b7d4ff;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.96), rgba(255,255,255,0) 42%),
        linear-gradient(135deg, #eef5ff, #f8fbff 48%, #fff7df);
      box-shadow: 0 14px 28px rgba(11, 92, 255, .12);
      text-align: center;
    }
    .completion-badge strong {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 112px;
      height: 112px;
      margin: 0 auto;
      border: 10px solid #dbe9ff;
      border-top-color: var(--blue);
      border-right-color: #20a4ff;
      border-radius: 50%;
      color: var(--blue-dark);
      background: #fff;
      font-size: 18px;
      line-height: 1;
      letter-spacing: .08em;
      box-shadow: inset 0 0 0 1px #eef5ff, 0 12px 24px rgba(11,92,255,.14);
    }
    .completion-badge span {
      display: block;
      margin-top: 14px;
      color: #172033;
      font-size: 20px;
      font-weight: 950;
    }
    .completion-badge em {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-style: normal;
      font-weight: 850;
    }
    .complete-notice {
      padding: 12px 13px;
      border: 1px solid #f0d580;
      border-radius: 15px;
      background: var(--yellow);
      color: #493200;
      font-weight: 850;
    }
    .praise-card {
      position: relative;
      padding: 14px;
      border: 1px solid #d7e5ff;
      border-radius: 18px;
      background: linear-gradient(180deg, #fbfdff, #f1f7ff);
      overflow: hidden;
    }
    .praise-line {
      min-height: 54px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      border-radius: 15px;
      background: #fff;
      color: #0b2a66;
      text-align: center;
      font-size: 18px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(15,54,120,.08);
    }
    .praise-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      place-items: center;
    }
    .praise-button {
      min-width: 180px;
      min-height: 50px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #0b5cff, #20a4ff);
      font-weight: 950;
      box-shadow: 0 12px 22px rgba(11,92,255,.24);
      cursor: pointer;
      transition: transform .12s ease;
    }
    .praise-button:active {
      transform: scale(.96);
    }
    .praise-count {
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }
    .float-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
    }
    .float-pop {
      position: absolute;
      left: 50%;
      bottom: 20px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      color: #0b2a66;
      font-size: 16px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(15,54,120,.14);
      transform: translateX(-50%);
      animation: floatPop 1.25s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes floatPop {
      0% { opacity: 0; transform: translate(-50%, 0) scale(.9); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--drift, 0px)), -76px) scale(1.04); }
    }
    .complete-actions {
      display: grid;
      gap: 9px;
    }

    .lightbox,
    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(5,16,38,.78);
    }
    .lightbox.show,
    .modal.show { display: flex; }
    .lightbox img {
      max-width: min(100%, 960px);
      max-height: 88vh;
      border-radius: 12px;
      background: #fff;
    }
    .close {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }
    .modal-card {
      width: min(100%, 390px);
      padding: 18px;
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .modal-card h3 {
      margin: 0 0 8px;
      font-size: 21px;
      color: #091a3f;
    }
    .modal-card p {
      margin: 0 0 16px;
      color: #344054;
      font-weight: 750;
    }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (min-width: 720px) {
      .app { padding: 20px; }
      .stage h2 { font-size: 30px; }
      .stage-body { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
      .text-col { min-width: 0; }
      .visual { margin-top: 0; }
      details, .audio-slot { grid-column: 1 / -1; }
      .controls { grid-template-columns: 1fr 1.5fr auto; }
      .restart { grid-column: auto; padding: 0 12px; }
      .complete-page { padding: 24px; }
      .complete-actions { grid-template-columns: 1fr; align-items: center; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>抖音搜索任务指南</h1>
      <p>按指定搜索词完成口述、浏览、整体评价与逐条内容评价</p>
    </header>

    <section class="progress-card" aria-label="当前进度">
      <div class="progress-line">
        <span id="stepCounter">第1步 / 共6步</span>
        <span id="shortTitle">录屏准备</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </section>

    <section class="stage" id="stage">
      <div class="stage-head">
        <span class="stage-kicker" id="stageKicker">第1步</span>
        <h2 id="stageTitle">录屏准备</h2>
      </div>
      <div class="stage-body">
        <div class="text-col">
          <p class="action" id="stageAction"></p>
          <div class="tip-list" id="tipList"></div>
          <div class="reminder" id="stageReminder"></div>
        </div>

        <figure class="visual" id="visualBox"></figure>

        <details id="detailsBox">
          <summary>展开查看简要说明</summary>
          <div class="details-body" id="detailsBody"></div>
        </details>

        <div class="audio-slot" id="audioSlot">
          <audio id="audioPlayer" controls></audio>
        </div>
      </div>
    </section>

    <nav class="controls" aria-label="步骤控制">
      <button class="btn secondary" id="prevBtn" type="button">上一步</button>
      <button class="btn primary" id="nextBtn" type="button">我已完成</button>
      <button class="restart" id="restartBtn" type="button">重新开始</button>
    </nav>

    <section class="complete-page" id="completePage" aria-live="polite">
      <div class="complete-hero">
        <h2>任务已完成</h2>
        <p>请保留好录屏材料，并回到正式问卷或任务页面继续处理。</p>
      </div>

      <div class="completion-badge" aria-label="流程通关提示">
        <strong>READY</strong>
        <span>流程通关</span>
        <em>下一步：回到正式页面</em>
      </div>

      <div class="complete-notice">
        本页面仅用于操作引导，不代表问卷已提交成功。如你还没有提交正式问卷，请返回正式问卷或任务页面完成提交。
      </div>

      <section class="praise-card" aria-label="完成反馈">
        <p class="praise-line" id="praiseLine">流程已确认，别忘了保留录屏</p>
        <div class="praise-row">
          <button class="praise-button" id="praiseBtn" type="button">夸夸老己</button>
          <div class="praise-count" id="praiseCount">还没有夸夸</div>
          <div class="float-layer" id="floatLayer" aria-hidden="true"></div>
        </div>
      </section>

      <div class="complete-actions" aria-label="完成后操作">
        <button class="btn secondary" id="reviewStepsBtn" type="button">重新查看步骤</button>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" type="button" id="lightboxClose" aria-label="关闭图片预览">×</button>
    <img id="lightboxImage" src="" alt="截图预览" />
  </div>

  <div class="modal" id="confirmModal" aria-hidden="true">
    <div class="modal-card">
      <h3 id="modalTitle">请确认</h3>
      <p id="modalText"></p>
      <div class="modal-actions">
        <button class="btn secondary" id="modalCancel" type="button">返回检查</button>
        <button class="btn primary" id="modalOk" type="button">确认完成</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'douyin-search-task-wizard-step';
    const COMPLETE_KEY = 'douyin-search-task-wizard-complete';
    const PRAISE_KEY = 'douyin-search-task-wizard-praise-count';

        caption: '问卷第4题：对本次搜索整体做判断。',
        confirm: {
          title: '整体评价确认',
          text: '请确认已经完成问卷第4题的整体搜索结果评价，再进入前8条逐条评价。'
        },
        details: [
          '先做整体评价，再进入前8条逐条评价。',
          '可以考虑：结果是否相关、是否有想点开的内容、质量是否可靠。',
          '如果有广告感、无关内容、重复内容，也要按真实感受填写。'
        ]
      },
      {
        title: '前8条逐条评价',
        action: '回到综合页顶部，不要刷新；从第1条到第8条，按顺序逐条点开、口述、填写评价。',
        reminder: '逐条评价要评价前8条，不是只评价自己自由浏览时点开过的视频。',
        image: 'assets/item-rating.jpg',
        caption: '每一题对应综合页中的一条搜索结果。',
        confirm: {
          title: '前8条评价确认',
          text: '请确认已从第1条到第8条按顺序全部评价。'
        },
        details: [
          '先回到搜索结果最上方，不要刷新页面。',
          '按综合页顺序，从第1条开始。',
          '每条都要结合实际观看情况填写。',
          '自由浏览阶段看过的视频，如果属于前8条，也仍然需要按顺序评价。'
        ]
      },
      {
        title: '提交确认',
        action: '确认问卷已填写完整，提交问卷，并保存完整录屏。',
        reminder: '提交前确认：录屏完整、声音正常、问卷所有评价都已完成。',
        image: null,
        imageText: '提交问卷 + 保存录屏',
        caption: '完成后请保留完整录屏，避免任务记录缺失。',
        details: [
          '确认整体评价已完成。',
          '确认前8条逐条评价已完成。',
          '确认录屏没有中断，能录到系统声音和自己的声音。'
        ]
      }
    ];

    let current = Number(localStorage.getItem(STORAGE_KEY) || 0);
    if (!Number.isInteger(current) || current < 0 || current >= steps.length) current = 0;
    let isComplete = localStorage.getItem(COMPLETE_KEY) === '1';
    let pendingNext = null;

    const progressCard = document.querySelector('.progress-card');
    const stage = document.getElementById('stage');
    const controls = document.querySelector('.controls');
    const stepCounter = document.getElementById('stepCounter');
    const shortTitle = document.getElementById('shortTitle');
    const progressFill = document.getElementById('progressFill');
    const stageKicker = document.getElementById('stageKicker');
    const stageTitle = document.getElementById('stageTitle');
    const stageAction = document.getElementById('stageAction');
    const tipList = document.getElementById('tipList');
    const stageReminder = document.getElementById('stageReminder');
    const visualBox = document.getElementById('visualBox');
    const detailsBody = document.getElementById('detailsBody');
    const detailsBox = document.getElementById('detailsBox');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const audioSlot = document.getElementById('audioSlot');
    const audioPlayer = document.getElementById('audioPlayer');
    const completePage = document.getElementById('completePage');
    const praiseLine = document.getElementById('praiseLine');
    const praiseBtn = document.getElementById('praiseBtn');
    const praiseCount = document.getElementById('praiseCount');
    const floatLayer = document.getElementById('floatLayer');
    const reviewStepsBtn = document.getElementById('reviewStepsBtn');

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxClose = document.getElementById('lightboxClose');

    const confirmModal = document.getElementById('confirmModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalCancel = document.getElementById('modalCancel');
    const modalOk = document.getElementById('modalOk');

    function render() {
      if (isComplete) {
        renderComplete();
        return;
      }

      progressCard.style.display = '';
      stage.style.display = '';
      controls.style.display = '';
      completePage.classList.remove('show');

      const step = steps[current];
      localStorage.setItem(STORAGE_KEY, String(current));

      stepCounter.textContent = `第${current + 1}步 / 共${steps.length}步`;
      shortTitle.textContent = step.title;
      progressFill.style.width = `${((current + 1) / steps.length) * 100}%`;
      stageKicker.textContent = `第${current + 1}步`;
      stageTitle.textContent = step.title;
      stageAction.innerHTML = step.action.replace(/不要刷新|不要自行更换搜索词|综合页|前8条/g, match => `<span class="red">${match}</span>`);
      if (step.tips && step.tips.length) {
        tipList.classList.add('show');
        tipList.innerHTML = step.tips.map(item => `<div class="tip-item">${item}</div>`).join('');
      } else {
        tipList.classList.remove('show');
        tipList.innerHTML = '';
      }
      stageReminder.textContent = step.reminder;
      stageReminder.classList.toggle('red', /不要|必须|前8条|不需要/.test(step.reminder));

      if (step.image) {
        visualBox.innerHTML = `
          <button type="button" data-img="${step.image}" aria-label="放大查看示例图">
            <img src="${step.image}" alt="${step.title}示例图" />
          </button>
          <figcaption class="visual-caption">${step.caption}</figcaption>
        `;
      } else if (step.visualType === 'recording') {
        visualBox.innerHTML = `
          <div class="recording-visual">
            <div class="recording-flow">
              <div class="recording-step">
                <b>1</b>
                <div><strong>开启手机录屏</strong><span>同时打开系统声音</span></div>
              </div>
              <div class="recording-step">
                <b>2</b>
                <div><strong>打开麦克风</strong><span>需要录到自己的口述</span></div>
              </div>
              <div class="recording-step">
                <b>3</b>
                <div><strong>录到两种声音</strong><span>系统声音 + 自己的声音</span></div>
              </div>
            </div>
          </div>
          <figcaption class="visual-caption">${step.caption}</figcaption>
        `;
      } else {
        visualBox.innerHTML = `
          <div class="visual-placeholder">${step.imageText}</div>
          <figcaption class="visual-caption">${step.caption}</figcaption>
        `;
      }

      detailsBox.open = false;
      detailsBody.innerHTML = `<ul>${step.details.map(item => `<li>${item}</li>`).join('')}</ul>`;

      if (step.audio) {
        audioPlayer.src = step.audio;
        audioSlot.classList.add('has-audio');
      } else {
        audioPlayer.removeAttribute('src');
        audioSlot.classList.remove('has-audio');
      }

      prevBtn.disabled = current === 0;
      nextBtn.textContent = current === steps.length - 1 ? '完成任务' : '我已完成';
    }

    function renderComplete() {
      localStorage.setItem(COMPLETE_KEY, '1');
      progressCard.style.display = 'none';
      stage.style.display = 'none';
      controls.style.display = 'none';
      completePage.classList.add('show');
      praiseLine.textContent = randomItem(praiseLines);
      updatePraiseCount();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goNext() {
      if (current < steps.length - 1) {
        current += 1;
        render();
      } else {
        isComplete = true;
        localStorage.setItem(STORAGE_KEY, String(steps.length - 1));
        render();
      }
    }

    function showModal(title, text, nextAction, okText = '确认完成', cancelText = '返回检查') {
      pendingNext = nextAction;
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalOk.textContent = okText;
      modalCancel.textContent = cancelText;
      confirmModal.classList.add('show');
      confirmModal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      confirmModal.classList.remove('show');
      confirmModal.setAttribute('aria-hidden', 'true');
      pendingNext = null;
    }

    prevBtn.addEventListener('click', () => {
      if (current > 0) {
        current -= 1;
        render();
      }
    });

    nextBtn.addEventListener('click', () => {
      const step = steps[current];
      if (step.confirm) {
        showModal(step.confirm.title, step.confirm.text, goNext);
      } else {
        goNext();
      }
    });

    restartBtn.addEventListener('click', () => {
      current = 0;
      isComplete = false;
      localStorage.setItem(STORAGE_KEY, '0');
      localStorage.removeItem(COMPLETE_KEY);
      render();
    });

    reviewStepsBtn.addEventListener('click', () => {
      current = 0;
      isComplete = false;
      localStorage.setItem(STORAGE_KEY, '0');
      localStorage.removeItem(COMPLETE_KEY);
      render();
    });

    praiseBtn.addEventListener('click', () => {
      const nextCount = Number(localStorage.getItem(PRAISE_KEY) || 0) + 1;
      localStorage.setItem(PRAISE_KEY, String(nextCount));
      updatePraiseCount();
      praiseLine.textContent = randomItem(praiseLines);
      spawnFloat();
    });

    modalCancel.addEventListener('click', closeModal);
    modalOk.addEventListener('click', () => {
      const action = pendingNext;
      closeModal();
      if (action) action();
    });

    visualBox.addEventListener('click', event => {
      const button = event.target.closest('[data-img]');
      if (!button) return;
      lightboxImage.src = button.dataset.img;
      lightbox.classList.add('show');
      lightbox.setAttribute('aria-hidden', 'false');
    });

    function closeLightbox() {
      lightbox.classList.remove('show');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', event => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeLightbox();
        closeModal();
      }
    });

    function updatePraiseCount() {
      const count = Number(localStorage.getItem(PRAISE_KEY) || 0);
      praiseCount.textContent = count > 0 ? `已夸夸 ${count} 次` : '还没有夸夸';
    }

    function randomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function spawnFloat() {
      const active = floatLayer.querySelectorAll('.float-pop');
      if (active.length >= 12) active[0].remove();

      const total = Math.random() > .72 ? 2 : 1;
      for (let i = 0; i < total; i += 1) {
        if (floatLayer.querySelectorAll('.float-pop').length >= 12) break;
        const item = document.createElement('span');
        item.className = 'float-pop';
        item.textContent = randomItem(floatWords);
        item.style.setProperty('--drift', `${Math.round(Math.random() * 72 - 36)}px`);
        item.style.left = `${48 + Math.random() * 10 - 5}%`;
        item.style.bottom = `${20 + i * 10}px`;
        floatLayer.appendChild(item);
        item.addEventListener('animationend', () => item.remove(), { once: true });
      }
    }

    render();
  </script>
</body>
</html>
